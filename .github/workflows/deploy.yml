name: Deploy EnglishTalk to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Export
        run: |
          npx expo export -p web
          touch dist/.nojekyll
          sed -i 's|src="/_expo/|src="./_expo/|g' dist/index.html
          # 注入 AdSense 驗證用的 meta 標籤到 <head>
          sed -i 's|</head>|<meta name="google-adsense-account" content="ca-pub-4011130961445948">\n</head>|' dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
